strict: true

disabled_rules:
  - todo          # TODO/FIXME are tracked in scoreboard.json, not hard-banned

included:
  - Sources
  - Tests

excluded:
  - .build
  - vendor
  - Sources/MeshProtos   # generated SwiftProtobuf output

opt_in_rules:
  - force_unwrapping
  - empty_count
  - explicit_init
  - first_where
  - last_where

# Universally-fine short names: GRDB closure params (db, t) and record ids.
identifier_name:
  excluded:
    - id
    - db
    - t
    - to
    - at

# `try!` and `as!` are banned everywhere by the default force_try / force_cast
# rules; force_unwrapping (opt-in) bans `!`. Tests relax these via the nested
# Tests/.swiftlint.yml so test code may force-unwrap fixtures.

custom_rules:
  domain_no_date:
    name: "Date() banned in Domain"
    regex: '\bDate\b'
    match_kinds:        # only real code tokens — never comments or strings
      - identifier
      - typeidentifier
    included: "Sources/Domain"
    message: "Domain reads time through the Clock port, never Date()."
    severity: error

name: verify

on:
  push:
  pull_request:

concurrency:
  group: verify-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      # Meshtrack targets macOS 26 / Swift 6.2 (Xcode 26). Select the newest
      # Xcode the runner provides; until GitHub images ship Xcode 26 this may
      # require a self-hosted runner (see AGENTS.md).
      - name: Select newest Xcode
        run: |
          sudo xcode-select -s /Applications/Xcode_26.app 2>/dev/null \
            || sudo xcode-select -s "$(ls -d /Applications/Xcode_*.app | sort -V | tail -1)"
          swift --version

      # Muter is not in brew-core; install Mint then Muter so the mutation gate
      # actually measures the floor in CI (see AGENTS.md "Toolchain notes").
      - name: Install Mint + Muter (mutation testing)
        run: |
          brew install mint
          mint install muter-mutation-testing/muter
          echo "$HOME/.mint/bin" >> "$GITHUB_PATH"

      - name: Bootstrap dev tooling
        run: make bootstrap

      # CI installs everything and enforces every gate (no skips). CI=true makes
      # the mutation gate hard: missing muter/config or a sub-floor score fails.
      - name: make verify
        env:
          CI: "true"
        run: make verify
